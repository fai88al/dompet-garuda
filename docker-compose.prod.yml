services:
  postgres:
    container_name: dompet-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: dompet
      POSTGRES_USER: dompet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dompet -d dompet"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: dompet-api
    image: ghcr.io/fai88al/dompet-garuda:latest
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: api
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dompet
      SPRING_DATASOURCE_USERNAME: dompet
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      SERVER_SIGNING_KEY: ${SERVER_SIGNING_KEY}
      POUCH_MAX_AMOUNT_IDR: ${POUCH_MAX_AMOUNT_IDR}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  worker:
    container_name: dompet-worker
    image: ghcr.io/fai88al/dompet-garuda:latest
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: worker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dompet
      SPRING_DATASOURCE_USERNAME: dompet
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      POUCH_MAX_AMOUNT_IDR: ${POUCH_MAX_AMOUNT_IDR}
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: dompet-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_logs:/var/log/caddy
    depends_on:
      api:
        condition: service_healthy

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: dompet-mosquitto
    restart: unless-stopped
    user: root
    ports:
      - "8883:8883"
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/config/acl:/mosquitto/config/acl:ro
      - ./mosquitto/start.sh:/start.sh:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_certs:/mosquitto/certs
      - caddy_data:/caddy_data:ro
    entrypoint: ["/bin/sh", "/start.sh"]
    depends_on:
      caddy:
        condition: service_started

volumes:
  pgdata:
  caddy_data:
    external: true
    name: dompet_caddy_data
  caddy_logs:
  mosquitto_data:
  mosquitto_certs: