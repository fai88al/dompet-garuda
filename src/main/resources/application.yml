spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# Maximum amount that can be loaded into an offline pouch in one provisioning call.
# Must be provided via POUCH_MAX_AMOUNT_IDR env var. No default — require explicit config.
pouch:
  max-amount-idr: ${POUCH_MAX_AMOUNT_IDR}
